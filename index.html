<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-TREND v2 — Учись кодить профессионально!</title>
<style>
/* ── Brand & Theme ── */
:root{--brand:#685BC7;--brand2:#8075D9;--lime:#B5ED18;--lime-fg:#050a00;--fafafa:#FAFAFA}
[data-theme="dark"]{--bg:#09080f;--bg2:#0f0d1e;--bg3:#161428;--card:#120f20;--sidebar:#0b0919;--text:#f0eeff;--text2:#9f9abf;--text3:#4f4a70;--border:#201d35;--codebg:#060510;--accent:#685BC7;--accent2:#8075D9;--hi:#B5ED18;--hi-fg:#050a00;--glow:rgba(104,91,199,.25);--err:#ff4757;--ok:#B5ED18;--warn:#ffa502}
[data-theme="light"]{--bg:#FAFAFA;--bg2:#f0edfb;--bg3:#e8e3f8;--card:#fff;--sidebar:#f5f2fd;--text:#1a1636;--text2:#4a4570;--text3:#8885aa;--border:#ddd8f5;--codebg:#0f0d1e;--accent:#685BC7;--accent2:#5048b0;--hi:#8ab510;--hi-fg:#1a2800;--glow:rgba(104,91,199,.12);--err:#dc2626;--ok:#7ab00a;--warn:#d97706}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
.dragging{cursor:col-resize!important;user-select:none!important}

/* ── Welcome ── */
.welcome{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.wcard{text-align:center;max-width:540px;width:100%}
.wpill{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 20px;font-size:.8rem;color:var(--text2);margin-bottom:28px}
.wemoji{font-size:3.6rem;margin-bottom:14px;display:block}
.wh{font-size:2.4rem;font-weight:900;margin-bottom:6px}
.wh .ai{color:var(--accent2)}.wh .trend{color:var(--hi)}
.wp{font-size:.95rem;color:var(--text2);line-height:1.7;margin-bottom:28px}
.wrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.winp{flex:1;min-width:200px;padding:13px 18px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
.winp:focus{border-color:var(--accent)}
.wbtn{padding:13px 28px;background:var(--hi);color:var(--hi-fg);border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .2s,box-shadow .2s;white-space:nowrap;box-shadow:0 4px 20px rgba(181,237,24,.3)}
.wbtn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(181,237,24,.4)}

/* ── App Shell ── */
.app{display:grid;grid-template-columns:268px 1fr;grid-template-rows:58px 1fr;height:100vh}

/* ── Topbar ── */
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:900;color:var(--text)}
.logo-box{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-ai{color:var(--accent2)}.logo-trend{color:var(--hi)}
.top-space{flex:1}
.prog-wrap{display:flex;align-items:center;gap:10px;font-size:.78rem;color:var(--text3)}
.prog-outer{width:120px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--accent),var(--hi));border-radius:3px;transition:width .4s ease}
.student-btn{background:var(--glow);border:1px solid var(--accent);border-radius:20px;padding:6px 14px;font-size:.82rem;color:var(--accent2);cursor:pointer;transition:all .2s;white-space:nowrap}
.student-btn:hover{background:var(--accent);color:#fff}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 13px;cursor:pointer;font-size:.95rem;color:var(--text);transition:border-color .2s}
.theme-btn:hover{border-color:var(--accent)}

/* ── Sidebar ── */
.sidebar{background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0}
.sb-head{padding:6px 18px 12px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text3)}
.lb{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:9px;border-left:3px solid transparent;transition:all .17s}
.lb:hover{background:var(--glow);border-left-color:var(--accent2)}
.lb.active{background:var(--glow);border-left-color:var(--accent)}
.lnum{width:26px;height:26px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--text3);flex-shrink:0;transition:all .17s}
.lb.active .lnum,.lb.done .lnum{background:var(--accent);border-color:var(--accent);color:#fff}
.lb.done .lnum::after{content:'✓'}
.linfo{flex:1;min-width:0}
.ltit{font-size:.83rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb.active .ltit{color:var(--accent2)}
.ltag{font-size:.67rem;color:var(--text3);margin-top:1px}

/* ── Main ── */
.main{display:flex;flex-direction:column;overflow:hidden}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text3);text-align:center;padding:40px}

/* ── Lesson View ── */
.lview{display:flex;flex-direction:column;height:100%;overflow:hidden;animation:fu .25s ease}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ltop{padding:14px 20px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.lmeta{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.lpill{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:3px 11px;border-radius:20px;font-size:.7rem;font-weight:700}
.lnl{font-size:.7rem;color:var(--text3)}
.lh{font-size:1.35rem;font-weight:800;line-height:1.2}
.ls{font-size:.85rem;color:var(--text2);margin-top:3px}

/* ── Split ── */
.split{display:grid;grid-template-columns:1fr 4px 1fr;flex:1;overflow:hidden}
.divider{background:var(--border);cursor:col-resize;transition:background .2s;position:relative;z-index:5}
.divider:hover,.divider.drag{background:var(--accent)}
.divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:40px;border-radius:4px;background:inherit;opacity:.5}

/* ── Left Panel ── */
.lpanel{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.ptabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.ptab{padding:9px 15px;font-size:.79rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .17s;white-space:nowrap;flex-shrink:0}
.ptab.on{color:var(--accent2);border-bottom-color:var(--accent2)}
.ptab:hover:not(.on){color:var(--text)}
.pbody{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* Theory */
.tscroll{flex:1;overflow-y:auto;padding:16px}
.ti{background:var(--card);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:13px 15px;margin-bottom:14px;font-size:.88rem;line-height:1.7;color:var(--text2)}
.ti strong{color:var(--text)}
.tc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:11px}
.tch{font-size:.88rem;font-weight:700;color:var(--accent2);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.tcb{font-size:.82rem;line-height:1.75;color:var(--text2)}
.tcb strong{color:var(--text)}
.ic{background:var(--codebg);color:#b5a4ff;padding:2px 6px;border-radius:5px;font-family:monospace;font-size:.8em}
.tpre{background:var(--codebg);border:1px solid var(--border);border-radius:9px;padding:13px;margin:9px 0;font-family:monospace;font-size:.76rem;line-height:1.7;color:#f0e8ff;overflow-x:auto;white-space:pre}
.tip{background:rgba(181,237,24,.07);border:1px solid rgba(181,237,24,.25);border-radius:9px;padding:11px 14px;font-size:.82rem;color:var(--text2);line-height:1.6;margin-top:9px}
.tip strong{color:var(--hi)}
.warn-box{background:rgba(255,165,2,.07);border:1px solid rgba(255,165,2,.25);border-radius:9px;padding:11px 14px;font-size:.82rem;color:var(--text2);line-height:1.6;margin-top:9px}
.warn-box strong{color:var(--warn)}

/* Code editor */
.code-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ctabs{display:flex;align-items:center;background:var(--codebg);border-bottom:1px solid var(--border);flex-shrink:0;gap:0;padding-right:8px}
.ctab{padding:8px 14px;font-size:.77rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .17s}
.ctab.on{color:#f0e8ff;border-bottom-color:var(--accent2)}
.ctab:hover:not(.on){color:var(--text2)}
.ctab-space{flex:1}
.undo-btn{padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:.75rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.undo-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent2)}
.undo-btn:disabled{opacity:.35;cursor:not-allowed}
.editor{width:100%;height:100%;background:var(--codebg);color:#f0e8ff;border:none;padding:13px 15px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:.8rem;line-height:1.65;resize:none;outline:none;tab-size:2}
.editor::selection{background:rgba(104,91,199,.4)}
.err-panel{background:#0d0008;border-top:1px solid rgba(255,71,87,.3);flex-shrink:0;max-height:110px;overflow-y:auto;font-family:monospace;font-size:.75rem}
.err-panel.hidden{display:none}
.err-row{padding:5px 12px;color:var(--err);display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid rgba(255,71,87,.1)}
.err-line{color:rgba(255,71,87,.6);flex-shrink:0;font-size:.7rem;padding-top:1px}
.err-clear{padding:4px 12px;text-align:right;font-size:.7rem;color:var(--text3);cursor:pointer}
.err-clear:hover{color:var(--err)}
.no-err{padding:6px 12px;color:var(--ok);font-size:.75rem;display:flex;align-items:center;gap:6px}

/* Editor bottom bar */
.editor-bar{background:var(--bg2);border-top:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.err-badge{font-size:.72rem;padding:3px 9px;border-radius:10px;font-weight:700;cursor:pointer}
.err-badge.has-err{background:rgba(255,71,87,.15);color:var(--err);border:1px solid rgba(255,71,87,.3)}
.err-badge.no-err-b{background:rgba(181,237,24,.1);color:var(--ok);border:1px solid rgba(181,237,24,.25)}
.complete-btn{margin-left:auto;padding:6px 16px;background:var(--hi);color:var(--hi-fg);border:none;border-radius:8px;font-size:.78rem;font-weight:800;cursor:pointer;transition:transform .2s,box-shadow .2s}
.complete-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(181,237,24,.35)}

/* Reference Panel */
.ref-scroll{flex:1;overflow-y:auto;padding:14px}
.ref-section{margin-bottom:18px}
.ref-h{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:10px}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.color-chip{border-radius:8px;height:34px;cursor:pointer;position:relative;border:2px solid transparent;transition:transform .15s,border-color .15s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px}
.color-chip:hover{transform:scale(1.1);border-color:var(--text)}
.color-chip .chex{font-size:.58rem;color:rgba(255,255,255,.9);text-shadow:0 1px 3px rgba(0,0,0,.8);font-family:monospace;font-weight:700;opacity:0;transition:opacity .15s}
.color-chip:hover .chex{opacity:1}
.color-chip.brand-chip{border-color:var(--accent)!important;box-shadow:0 0 8px var(--glow)}
.copied-tip{position:fixed;bottom:20px;right:20px;background:var(--hi);color:var(--hi-fg);padding:8px 16px;border-radius:10px;font-size:.82rem;font-weight:700;z-index:9999;animation:popIn .2s ease;pointer-events:none}
@keyframes popIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.font-grid{display:flex;flex-direction:column;gap:5px}
.font-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;transition:border-color .15s}
.font-row:hover{border-color:var(--accent)}
.font-label{font-size:.72rem;font-weight:700;color:var(--text3);width:36px}
.font-px{font-family:monospace;font-size:.78rem;color:var(--accent2);width:44px}
.font-preview{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Right Panel Preview ── */
.rpanel{display:flex;flex-direction:column;overflow:hidden;min-width:0}
.pbar{padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dots{display:flex;gap:5px}
.dot{width:11px;height:11px;border-radius:50%}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28c840}
.plabel{font-size:.73rem;color:var(--text3);flex:1;text-align:center}
.pw-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);white-space:nowrap}
.pw-badge.mobile{background:rgba(181,237,24,.1);border-color:rgba(181,237,24,.3);color:var(--hi)}
.preview-iframe{flex:1;border:none;background:#fff}

/* ── Quiz ── */
.quiz-wrap{flex:1;overflow-y:auto;padding:16px}
.quiz-q{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.quiz-qnum{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px}
.quiz-preview{background:#fff;border-radius:8px;padding:10px 14px;margin-bottom:12px;min-height:50px;display:flex;align-items:center}
.quiz-qtext{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.5}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qopt{padding:9px 14px;background:var(--bg3);border:2px solid var(--border);border-radius:9px;font-size:.82rem;font-family:monospace;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.qopt:hover:not(.locked){border-color:var(--accent);color:var(--accent2)}
.qopt.correct{background:rgba(181,237,24,.1);border-color:var(--hi);color:var(--ok)!important}
.qopt.wrong{background:rgba(255,71,87,.1);border-color:var(--err);color:var(--err)!important}
.qopt.locked{cursor:default}
.quiz-score{text-align:center;padding:24px;background:var(--card);border-radius:16px;border:1px solid var(--border)}
.score-big{font-size:3rem;font-weight:900;color:var(--hi);line-height:1}
.score-sub{font-size:.9rem;color:var(--text2);margin-top:8px;margin-bottom:20px}
.score-retry{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;transition:transform .2s}
.score-retry:hover{transform:translateY(-2px)}

/* ── Prompts Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;max-width:680px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.modal-title{font-size:1.1rem;font-weight:800;flex:1}
.modal-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{border-color:var(--err);color:var(--err)}
.modal-body{flex:1;overflow-y:auto;padding:18px}
.prompt-cat{margin-bottom:20px}
.pcat-h{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--accent2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.prompt-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;position:relative}
.prompt-text{font-family:monospace;font-size:.76rem;line-height:1.65;color:var(--text2);white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto}
.copy-btn{position:absolute;top:10px;right:10px;padding:4px 10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.72rem;font-weight:700;cursor:pointer;transition:transform .15s}
.copy-btn:hover{transform:scale(1.05)}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
</style>
</head>
<body>

<!-- Welcome -->
<div class="welcome" id="welcome">
  <div class="wcard">
    <div class="wpill">🤖 AI-TREND School · Для детей 12–17 лет</div>
    <span class="wemoji">⚡</span>
    <h1 class="wh"><span class="ai">AI-</span><span class="trend">TREND</span></h1>
    <p class="wp">Привет! Вводи своё имя — и каждый урок станет персональным.<br>Кодируй, учись, создавай сайты и работай с нейросетями!</p>
    <div class="wrow">
      <input class="winp" id="nameInp" type="text" placeholder="Твоё имя..." maxlength="25"/>
      <button class="wbtn" onclick="startApp()">Начать →</button>
    </div>
  </div>
</div>

<!-- App -->
<div class="app" id="app" style="display:none">
  <header class="topbar">
    <div class="logo">
      <div class="logo-box">⚡</div>
      <span><span class="logo-ai">AI-</span><span class="logo-trend">TREND</span></span>
    </div>
    <div class="top-space"></div>
    <div class="prog-wrap">
      <span id="progTxt">0 / 8</span>
      <div class="prog-outer"><div class="prog-inner" id="progBar" style="width:0%"></div></div>
    </div>
    <div class="student-btn" onclick="changeName()" id="studentBtn">👤 Ученик</div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </header>
  <aside class="sidebar" id="sidebar"><div class="sb-head">8 уроков</div><div id="lessonList"></div></aside>
  <main class="main" id="main">
    <div class="empty"><div style="font-size:3rem">👈</div><p style="font-size:1rem;font-weight:600;color:var(--text2)">Выбери урок слева</p></div>
  </main>
</div>

<!-- Prompts Modal -->
<div class="modal-bg hidden" id="promptsModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="promptsTitle">🚀 Промпты для ИИ</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="promptsBody"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const BRAND_COLORS=[
  {n:'Brand Purple',h:'#685BC7',brand:true},
  {n:'Accent Purple',h:'#8075D9',brand:true},
  {n:'Lime Accent',h:'#B5ED18',brand:true},
  {n:'Near White',h:'#FAFAFA',brand:true},
];
const WEB_COLORS=[
  {n:'Dark Navy',h:'#0d0d1a'},{n:'Dark Purple',h:'#1a1a2e'},{n:'Deep Blue',h:'#0f172a'},
  {n:'Purple',h:'#7c3aed'},{n:'Violet',h:'#8b5cf6'},{n:'Pink',h:'#ec4899'},
  {n:'Red',h:'#ef4444'},{n:'Orange',h:'#f97316'},{n:'Yellow',h:'#eab308'},
  {n:'Lime',h:'#84cc16'},{n:'Green',h:'#22c55e'},{n:'Teal',h:'#14b8a6'},
  {n:'Cyan',h:'#06b6d4'},{n:'Blue',h:'#3b82f6'},{n:'Sky',h:'#0ea5e9'},
  {n:'White',h:'#ffffff'},{n:'Light Gray',h:'#f3f4f6'},{n:'Gray',h:'#9ca3af'},
  {n:'Dark Gray',h:'#374151'},{n:'Black',h:'#111111'},
];
const FONT_SIZES=[

✅ Указывай формат ответа
✅ Итерируй — улучшай результат!`
},
]; // end LESSONS

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let studentName = localStorage.getItem('at2_name')||'';
let theme       = localStorage.getItem('at2_theme')||'dark';
let activeLsn   = -1;
let activeTab   = 'theory'; // theory | code | ref | quiz
let activeCode  = 'html';
let undoStack   = [];
let undoPtr     = -1;
let errors      = [];
let quizAnswers = {};
let completedLessons = new Set(JSON.parse(localStorage.getItem('at2_done')||'[]'));

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init(){
  applyTheme(theme);
  document.getElementById('nameInp').addEventListener('keydown',e=>{if(e.key==='Enter')startApp()});
  if(studentName) showApp();
}

function startApp(){
  const v=document.getElementById('nameInp').value.trim();
  if(!v){shakeInput();return}
  studentName=v;
  localStorage.setItem('at2_name',v);
  showApp();
}
function shakeInput(){
  const el=document.getElementById('nameInp');
  el.style.borderColor='var(--err)';
  el.style.animation='none';
  setTimeout(()=>{el.style.borderColor='';},1200);
  el.focus();
}
function showApp(){
  document.getElementById('welcome').style.display='none';
  document.getElementById('app').style.display='grid';
  document.getElementById('studentBtn').textContent='👤 '+studentName;
  buildSidebar();
  updateProgress();
}
function changeName(){
  document.getElementById('nameInp').value=studentName;
  document.getElementById('welcome').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ══════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
}
function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  localStorage.setItem('at2_theme',theme);
  applyTheme(theme);
}

// ══════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════
function updateProgress(){
  const done=completedLessons.size;
  const total=LESSONS.length;
  document.getElementById('progTxt').textContent=done+' / '+total;
  document.getElementById('progBar').style.width=(done/total*100)+'%';
}
function markDone(idx){
  completedLessons.add(idx);
  localStorage.setItem('at2_done',JSON.stringify([...completedLessons]));
  updateProgress();
  buildSidebar();
}

// ══════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════
function buildSidebar(){
  document.getElementById('lessonList').innerHTML=LESSONS.map((l,i)=>`
    <div class="lb ${i===activeLsn?'active':''} ${completedLessons.has(i)?'done':''}" onclick="loadLesson(${i})">
      <div class="lnum">${completedLessons.has(i)?'✓':l.emoji}</div>
      <div class="linfo"><div class="ltit">${l.title}</div><div class="ltag">${l.tag}</div></div>
    </div>`).join('');
}

// ══════════════════════════════════════════════
// LOAD LESSON
// ══════════════════════════════════════════════
function loadLesson(idx){
  activeLsn=idx; activeTab='theory'; activeCode='html';
  undoStack=[]; undoPtr=-1; errors=[];
  quizAnswers={};
  document.querySelectorAll('.lb').forEach((el,i)=>el.classList.toggle('active',i===idx));
  const l=LESSONS[idx];
  const isPrompt=l.tag==='ИИ / Промпты';
  document.getElementById('main').innerHTML=`
    <div class="lview">
      <div class="ltop">
        <div class="lmeta">
          <span class="lpill">${l.tag}</span>
          <span class="lnl">Урок ${idx+1} из ${LESSONS.length}</span>
        </div>
        <div class="lh">${l.emoji} ${l.title}</div>
        <div class="ls">${l.subtitle}</div>
      </div>
      <div class="split" id="split">
        <div class="lpanel">
          <div class="ptabs" id="ptabs">
            <div class="ptab on" id="pt-theory" onclick="switchTab('theory')">📖 Теория</div>
            <div class="ptab" id="pt-quiz"   onclick="switchTab('quiz')">🧩 Тест</div>
            <div class="ptab" id="pt-code"   onclick="switchTab('code')">⌨️ ${isPrompt?'Редактор':'Код'}</div>
            <div class="ptab" id="pt-ref"    onclick="switchTab('ref')">🎨 Справка</div>
          </div>
          <div class="pbody" id="pbody"></div>
        </div>
        <div class="divider" id="divider"></div>
        <div class="rpanel">
          <div class="pbar">
            <div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div>
            <div class="plabel">${isPrompt?'📝 Редактор промптов':'🌐 Предпросмотр'}</div>
            <div class="pw-badge" id="pwBadge">🖥️ Desktop</div>
          </div>
          <iframe class="preview-iframe" id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
      </div>
    </div>`;
  initDrag();
  switchTab('theory');
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
function switchTab(tab){
  activeTab=tab;
  ['theory','quiz','code','ref'].forEach(t=>{
    const el=document.getElementById('pt-'+t);
    if(el) el.classList.toggle('on',t===tab);
  });
  const l=LESSONS[activeLsn];
  if(tab==='theory') renderTheory(l);
  else if(tab==='quiz') renderQuiz(l);
  else if(tab==='code') renderCode(l);
  else if(tab==='ref') renderRef();
}

// ══════════════════════════════════════════════
// THEORY
// ══════════════════════════════════════════════
function renderTheory(l){
  document.getElementById('pbody').innerHTML=`<div class="tscroll">${l.theory(studentName)}<br>
    <button onclick="switchTab('quiz')" style="padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;margin-top:4px">Пройти тест по уроку →</button>
  </div>`;
  renderPreview(l);
}

// ══════════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════════
function renderQuiz(l){
  const qs=l.quiz;
  const answered=Object.keys(quizAnswers).length;
  const done=answered===qs.length;
  if(done){
    const correct=qs.filter((_,i)=>quizAnswers[i]===qs[i].ans).length;
    const score=Math.round(correct/qs.length*100);
    const emoji=score===100?'🏆':score>=75?'🌟':score>=50?'👍':'📚';
    document.getElementById('pbody').innerHTML=`<div class="quiz-wrap">
      <div class="quiz-score">
        <div style="font-size:2.5rem;margin-bottom:12px">${emoji}</div>
        <div class="score-big">${score}%</div>
        <div class="score-sub">${correct} из ${qs.length} правильно${score===100?' — Идеально!':score>=75?' — Отличный результат!':' — Попробуй ещё раз!'}</div>
        <button class="score-retry" onclick="resetQuiz()">Пройти снова</button>
      </div>
    </div>`;
    return;
  }
  document.getElementById('pbody').innerHTML=`<div class="quiz-wrap">${qs.map((q,i)=>`
    <div class="quiz-q" id="qq${i}">
      <div class="quiz-qnum">Вопрос ${i+1} из ${qs.length}</div>
      ${q.pre?`<div class="quiz-preview">${q.pre}</div>`:''}
      <div class="quiz-qtext">${q.q}</div>
      <div class="quiz-opts">${q.opts.map((o,j)=>`
        <div class="qopt ${quizAnswers[i]!==undefined?'locked':''} ${quizAnswers[i]===j?(j===q.ans?'correct':'wrong'):(quizAnswers[i]!==undefined&&j===q.ans?'correct':'')}"
          onclick="${quizAnswers[i]===undefined?`answerQ(${i},${j},${q.ans})`:''}">
          ${o}
        </div>`).join('')}
      </div>
    </div>`).join('')}
  </div>`;
}
function answerQ(qi,ai,correct){
  quizAnswers[qi]=ai;
  renderQuiz(LESSONS[activeLsn]);
  // auto scroll to next unanswered
  setTimeout(()=>{
    const qs=LESSONS[activeLsn].quiz;
    const allDone=Object.keys(quizAnswers).length===qs.length;
    if(allDone) renderQuiz(LESSONS[activeLsn]);
  },400);
}
function resetQuiz(){quizAnswers={};renderQuiz(LESSONS[activeLsn]);}

// ══════════════════════════════════════════════
// CODE EDITOR
// ══════════════════════════════════════════════
function renderCode(l){
  const isPrompt=l.tag==='ИИ / Промпты';
  const hCode=l.html(studentName);
  const cCode=l.css(studentName);
  document.getElementById('pbody').innerHTML=`
    <div class="code-area">
      <div class="ctabs">
        <div class="ctab on" id="ct-html" onclick="switchCode('html')">${isPrompt?'📝 Промпт':'HTML'}</div>
        <div class="ctab" id="ct-css"  onclick="switchCode('css')">${isPrompt?'💡 Примеры':'CSS'}</div>
        <div class="ctab-space"></div>
        <button class="undo-btn" id="undoBtn" onclick="doUndo()" disabled>↩ Отменить</button>
      </div>
      <div style="flex:1;position:relative;overflow:hidden">
        <textarea class="editor" id="htmlEd" spellcheck="false"></textarea>
        <textarea class="editor" id="cssEd"  spellcheck="false" style="display:none"></textarea>
      </div>
      <div class="err-panel hidden" id="errPanel">
        <div class="err-clear" onclick="clearErrors()">✕ Очистить</div>
      </div>
      <div class="editor-bar">
        <div class="err-badge no-err-b" id="errBadge" onclick="toggleErrPanel()">✓ Ошибок нет</div>
        <button class="complete-btn" onclick="openPrompts()">✅ Завершить урок</button>
      </div>
    </div>`;
  const htmlEd=document.getElementById('htmlEd');
  const cssEd=document.getElementById('cssEd');
  htmlEd.value=hCode; cssEd.value=cCode;
  pushUndo();
  function update(){pushUndo();renderPreviewCode();}
  htmlEd.addEventListener('input',update);
  cssEd.addEventListener('input',update);
  [htmlEd,cssEd].forEach(ed=>{
    ed.addEventListener('keydown',e=>{
      if(e.key==='Tab'){e.preventDefault();const s=ed.selectionStart;ed.value=ed.value.substring(0,s)+'  '+ed.value.substring(ed.selectionEnd);ed.selectionStart=ed.selectionEnd=s+2;update();}
      if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();}
    });
  });
  switchCode('html');
  renderPreviewCode();
}
function switchCode(tab){
  activeCode=tab;
  document.getElementById('ct-html')?.classList.toggle('on',tab==='html');
  document.getElementById('ct-css')?.classList.toggle('on',tab==='css');
  document.getElementById('htmlEd').style.display=tab==='html'?'block':'none';
  document.getElementById('cssEd').style.display=tab==='css'?'block':'none';
}

// ══════════════════════════════════════════════
// UNDO
// ══════════════════════════════════════════════
function pushUndo(){
  const h=document.getElementById('htmlEd')?.value||'';
  const c=document.getElementById('cssEd')?.value||'';
  undoStack.splice(undoPtr+1);
  undoStack.push({h,c});
  if(undoStack.length>60)undoStack.shift();
  undoPtr=undoStack.length-1;
  document.getElementById('undoBtn').disabled=undoPtr<=0;
}
function doUndo(){
  if(undoPtr>0){
    undoPtr--;
    const s=undoStack[undoPtr];
    document.getElementById('htmlEd').value=s.h;
    document.getElementById('cssEd').value=s.c;
    document.getElementById('undoBtn').disabled=undoPtr<=0;
    renderPreviewCode();
  }
}

// ══════════════════════════════════════════════
// ERRORS
// ══════════════════════════════════════════════
function addError(msg,line){
  errors.push({msg,line});
  const badge=document.getElementById('errBadge');
  const panel=document.getElementById('errPanel');
  if(!badge||!panel)return;
  badge.className='err-badge has-err';
  badge.textContent='⚠ '+errors.length+' ошибк'+(errors.length===1?'а':'и');
  const rows=errors.map(e=>`<div class="err-row"><span class="err-line">L${e.line||'?'}</span><span>${escHtml(e.msg)}</span></div>`).join('');
  panel.innerHTML=`<div class="err-clear" onclick="clearErrors()">✕ Очистить</div>${rows}`;
}
function clearErrors(){
  errors=[];
  const badge=document.getElementById('errBadge');
  const panel=document.getElementById('errPanel');
  if(badge){badge.className='err-badge no-err-b';badge.textContent='✓ Ошибок нет';}
  if(panel){panel.innerHTML='<div class="err-clear" onclick="clearErrors()">✕ Очистить</div>';panel.classList.add('hidden');}
}
function toggleErrPanel(){
  const p=document.getElementById('errPanel');
  if(p)p.classList.toggle('hidden');
}
window.addEventListener('message',e=>{
  if(e.data?.t==='jsErr')addError(e.data.msg,e.data.line);
});

// ══════════════════════════════════════════════
// PREVIEW
// ══════════════════════════════════════════════
function renderPreview(l){
  const iframe=document.getElementById('preview');
  if(!iframe)return;
  const isPrompt=l.tag==='ИИ / Промпты';
  if(isPrompt){
    iframe.srcdoc=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:#09080f;color:#f0eeff;padding:24px;line-height:1.7}h1{font-size:20px;color:#B5ED18;margin-bottom:20px}.box{background:#120f20;border:1px solid #201d35;border-radius:12px;padding:18px;margin-bottom:16px}.bl{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#685BC7;margin-bottom:8px}pre{font-family:monospace;font-size:13px;color:#9f9abf;white-space:pre-wrap;line-height:1.7}</style></head><body>
    <h1>🧠 Редактор промптов — ${escHtml(studentName)}</h1>
    <div class="box"><div class="bl">Формула идеального промпта</div><pre>РОЛЬ + ЗАДАЧА + КОНТЕКСТ + ФОРМАТ</pre></div>
    <div class="box"><div class="bl">Пример хорошего промпта</div><pre>Ты — опытный учитель математики для детей 12 лет.\nОбъясни что такое дроби, используя примеры с пиццей.\nНапиши 3 примера с решениями.\nИспользуй простой язык без сложных терминов.</pre></div>
    </body></html>`;
    return;
  }
  const html=l.html(studentName);
  const css=l.css(studentName);
  buildPreview(html,css);
}
function renderPreviewCode(){
  const h=document.getElementById('htmlEd')?.value||'';
  const c=document.getElementById('cssEd')?.value||'';
  const l=LESSONS[activeLsn];
  if(l?.tag==='ИИ / Промпты'){
    renderPreview(l);return;
  }
  buildPreview(h,c);
}
function buildPreview(html,css){
  const iframe=document.getElementById('preview');
  if(!iframe)return;
  const errScript=`<script>window.onerror=function(m,s,l,c,e){parent.postMessage({t:'jsErr',msg:m,line:l},'*');return false};<\/script>`;
  let doc=html;
  if(doc.includes('</head>'))doc=doc.replace('</head>',`<style>${css}</style>${errScript}</head>`);
  else doc=`<style>${css}</style>${errScript}${doc}`;
  iframe.srcdoc=doc;
  clearErrors();
}

// ══════════════════════════════════════════════
// REFERENCE PANEL
// ══════════════════════════════════════════════
function renderRef(){
  document.getElementById('pbody').innerHTML=`<div class="ref-scroll">
    <div class="ref-section">
      <div class="ref-h">🎨 Цвета бренда AI-TREND</div>
      <div class="color-grid">${BRAND_COLORS.map(c=>`
        <div class="color-chip brand-chip" style="background:${c.h}" title="${c.n}: ${c.h}" onclick="insertColor('${c.h}')">
          <span class="chex">${c.h}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="ref-section">
      <div class="ref-h">🌈 Веб-цвета</div>
      <div class="color-grid">${WEB_COLORS.map(c=>`
        <div class="color-chip" style="background:${c.h}" title="${c.n}: ${c.h}" onclick="insertColor('${c.h}')">
          <span class="chex">${c.h}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="ref-section">
      <div class="ref-h">📐 Размеры шрифта (кликни → вставить)</div>
      <div class="font-grid">${FONT_SIZES.map(f=>`
        <div class="font-row" onclick="insertText('${f.px}')">
          <span class="font-label">${f.l}</span>
          <span class="font-px">${f.px}</span>
          <span class="font-preview" style="font-size:${f.px};line-height:1.2">AI-TREND</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}
function insertColor(hex){
  insertText(hex);
  showCopied('Цвет вставлен: '+hex);
}
function insertText(val){
  // Insert into whichever editor is visible
  switchTab('code');
  const ed=activeCode==='html'?document.getElementById('htmlEd'):document.getElementById('cssEd');
  if(!ed){navigator.clipboard?.writeText(val);showCopied('Скопировано: '+val);return;}
  const s=ed.selectionStart,e2=ed.selectionEnd;
  ed.value=ed.value.substring(0,s)+val+ed.value.substring(e2);
  ed.selectionStart=ed.selectionEnd=s+val.length;
  ed.focus();
  pushUndo();
  renderPreviewCode();
}
function showCopied(msg){
  const el=document.createElement('div');
  el.className='copied-tip';el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

// ══════════════════════════════════════════════
// PROMPTS MODAL
// ══════════════════════════════════════════════
function openPrompts(){
  if(activeLsn>=0) markDone(activeLsn);
  const l=LESSONS[activeLsn];
  const keys=l?.promptKeys||Object.keys(ALL_PROMPTS);
  document.getElementById('promptsTitle').textContent='🚀 Промпты для: '+l.title;
  document.getElementById('promptsBody').innerHTML=`
    <div style="background:var(--glow);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:20px;font-size:.88rem;color:var(--text2)">
      🎉 <strong style="color:var(--hi)">Урок завершён, ${escHtml(studentName)}!</strong> Ниже — готовые промпты для ChatGPT и Claude по теме этого урока. Копируй и используй!
    </div>
    ${keys.map(k=>ALL_PROMPTS[k]?`
    <div class="prompt-cat">
      <div class="pcat-h">${ALL_PROMPTS[k].label}</div>
      <div class="prompt-box">
        <button class="copy-btn" onclick="copyPrompt(this,'${k}')">Копировать</button>
        <div class="prompt-text" id="pt-${k}">${escHtml(ALL_PROMPTS[k].text)}</div>
      </div>
    </div>`:''). join('')}`;
  document.getElementById('promptsModal').classList.remove('hidden');
}
function copyPrompt(btn,key){
  const text=ALL_PROMPTS[key]?.text||'';
  navigator.clipboard?.writeText(text).then(()=>{
    btn.textContent='✓ Скопировано!';
    setTimeout(()=>btn.textContent='Копировать',2000);
  });
}
function closeModal(){document.getElementById('promptsModal').classList.add('hidden');}

// ══════════════════════════════════════════════
// DRAG TO RESIZE
// ══════════════════════════════════════════════
function initDrag(){
  const divider=document.getElementById('divider');
  const split=document.getElementById('split');
  if(!divider||!split)return;
  let dragging=false;
  divider.addEventListener('mousedown',e=>{
    dragging=true;divider.classList.add('drag');
    document.body.classList.add('dragging');e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const r=split.getBoundingClientRect();
    let pct=((e.clientX-r.left)/r.width)*100;
    pct=Math.max(22,Math.min(75,pct));
    split.style.gridTemplateColumns=`${pct}fr 4px ${100-pct}fr`;
    const previewW=r.width*(1-pct/100);
    const badge=document.getElementById('pwBadge');
    if(badge){
      if(previewW<420){badge.className='pw-badge mobile';badge.textContent='📱 '+Math.round(previewW)+'px';}
      else if(previewW<768){badge.className='pw-badge';badge.textContent='📱 Tablet '+Math.round(previewW)+'px';}
      else{badge.className='pw-badge';badge.textContent='🖥️ '+Math.round(previewW)+'px';}
    }
  });
  document.addEventListener('mouseup',()=>{
    if(dragging){dragging=false;divider.classList.remove('drag');document.body.classList.remove('dragging');}
  });
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
// START
// ══════════════════════════════════════════════
init();
</script>
