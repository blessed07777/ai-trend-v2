<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-TREND v2 — Учись кодить профессионально!</title>
<style>
:root{--brand:#685BC7;--brand2:#8075D9;--lime:#B5ED18;--lime-fg:#050a00;--fafafa:#FAFAFA}
[data-theme="dark"]{--bg:#09080f;--bg2:#0f0d1e;--bg3:#161428;--card:#120f20;--sidebar:#0b0919;--text:#f0eeff;--text2:#9f9abf;--text3:#4f4a70;--border:#201d35;--codebg:#060510;--accent:#685BC7;--accent2:#8075D9;--hi:#B5ED18;--hi-fg:#050a00;--glow:rgba(104,91,199,.25);--err:#ff4757;--ok:#B5ED18;--warn:#ffa502}
[data-theme="light"]{--bg:#FAFAFA;--bg2:#f0edfb;--bg3:#e8e3f8;--card:#fff;--sidebar:#f5f2fd;--text:#1a1636;--text2:#4a4570;--text3:#8885aa;--border:#ddd8f5;--codebg:#0f0d1e;--accent:#685BC7;--accent2:#5048b0;--hi:#8ab510;--hi-fg:#1a2800;--glow:rgba(104,91,199,.12);--err:#dc2626;--ok:#7ab00a;--warn:#d97706}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s}
/* ─ критично для плавного drag ─ */
.dragging{cursor:col-resize!important;user-select:none!important}
.dragging .preview-iframe{pointer-events:none!important}
.dragging .lpanel{pointer-events:none!important}

/* Welcome */
.welcome{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.wcard{text-align:center;max-width:540px;width:100%}
.wpill{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 20px;font-size:.8rem;color:var(--text2);margin-bottom:28px}
.wemoji{font-size:3.6rem;margin-bottom:14px;display:block}
.wh{font-size:2.4rem;font-weight:900;margin-bottom:6px}
.wh .ai{color:var(--accent2)}.wh .tr{color:var(--hi)}
.wp{font-size:.95rem;color:var(--text2);line-height:1.7;margin-bottom:28px}
.wrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.winp{flex:1;min-width:200px;padding:13px 18px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;outline:none;transition:border-color .2s}
.winp:focus{border-color:var(--accent)}
.wbtn{padding:13px 28px;background:var(--hi);color:var(--hi-fg);border:none;border-radius:12px;font-size:1rem;font-weight:800;cursor:pointer;transition:transform .2s,box-shadow .2s;white-space:nowrap;box-shadow:0 4px 20px rgba(181,237,24,.3)}
.wbtn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(181,237,24,.4)}

/* App */
.app{display:grid;grid-template-columns:268px 1fr;grid-template-rows:58px 1fr;height:100vh}
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px}
.logo{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:900;color:var(--text)}
.logo-box{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-ai{color:var(--accent2)}.logo-tr{color:var(--hi)}
.top-space{flex:1}
.prog-wrap{display:flex;align-items:center;gap:10px;font-size:.78rem;color:var(--text3)}
.prog-outer{width:120px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-inner{height:100%;background:linear-gradient(90deg,var(--accent),var(--hi));border-radius:3px;transition:width .4s ease}
.student-btn{background:var(--glow);border:1px solid var(--accent);border-radius:20px;padding:6px 14px;font-size:.82rem;color:var(--accent2);cursor:pointer;transition:all .2s;white-space:nowrap}
.student-btn:hover{background:var(--accent);color:#fff}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 13px;cursor:pointer;font-size:.95rem;color:var(--text);transition:border-color .2s}
.theme-btn:hover{border-color:var(--accent)}

/* Sidebar */
.sidebar{background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0;display:flex;flex-direction:column}
.sb-list{flex:1;overflow-y:auto}
.sb-footer{padding:14px 14px 18px;flex-shrink:0;border-top:1px solid var(--border);margin-top:auto}
.reset-btn{width:100%;padding:9px 0;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text3);font-size:.76rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.reset-btn:hover{border-color:var(--err);color:var(--err);background:rgba(255,71,87,.07)}
.reset-confirm{display:none;margin-top:8px;text-align:center}
.reset-confirm.show{display:flex;gap:6px}
.rc-yes{flex:1;padding:7px 0;background:var(--err);color:#fff;border:none;border-radius:8px;font-size:.74rem;font-weight:800;cursor:pointer;transition:opacity .2s}
.rc-yes:hover{opacity:.85}
.rc-no{flex:1;padding:7px 0;background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;font-size:.74rem;font-weight:700;cursor:pointer;transition:all .2s}
.rc-no:hover{border-color:var(--accent);color:var(--accent2)}
.sb-head{padding:6px 18px 12px;font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--text3)}
.lb{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:9px;border-left:3px solid transparent;transition:all .17s}
.lb:hover{background:var(--glow);border-left-color:var(--accent2)}
.lb.active{background:var(--glow);border-left-color:var(--accent)}
.lnum{width:26px;height:26px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--text3);flex-shrink:0;transition:all .17s}
.lb.active .lnum,.lb.done .lnum{background:var(--accent);border-color:var(--accent);color:#fff}
.linfo{flex:1;min-width:0}
.ltit{font-size:.83rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb.active .ltit{color:var(--accent2)}
.ltag{font-size:.67rem;color:var(--text3);margin-top:1px}

/* Main */
.main{display:flex;flex-direction:column;overflow:hidden}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--text3);text-align:center;padding:40px}

/* Lesson view */
.lview{display:flex;flex-direction:column;height:100%;overflow:hidden;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ltop{padding:14px 20px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.lmeta{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.lpill{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:3px 11px;border-radius:20px;font-size:.7rem;font-weight:700}
.lnl{font-size:.7rem;color:var(--text3)}
.lh{font-size:1.35rem;font-weight:800;line-height:1.2}
.ls{font-size:.85rem;color:var(--text2);margin-top:3px}

/* ─── SPLIT with smooth drag ─── */
.split{display:flex;flex:1;overflow:hidden}
.lpanel{display:flex;flex-direction:column;overflow:hidden;min-width:200px;flex-shrink:0}
/* divider */
.dvd{width:5px;flex-shrink:0;background:var(--border);cursor:col-resize;position:relative;transition:background .15s;z-index:10}
.dvd:hover,.dvd.dragging{background:var(--accent)}
.dvd::after{content:'⋮';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;color:var(--text3);pointer-events:none;opacity:.6}
.dvd.dragging::after{color:var(--accent2);opacity:1}
.rpanel{display:flex;flex-direction:column;overflow:hidden;flex:1;min-width:200px}

/* Tabs */
.ptabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.ptab{padding:9px 15px;font-size:.79rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .17s;white-space:nowrap;flex-shrink:0}
.ptab.on{color:var(--accent2);border-bottom-color:var(--accent2)}
.ptab:hover:not(.on){color:var(--text)}
.ptab.prompts-tab{display:none}
.ptab.prompts-tab.visible{display:block;color:var(--hi)!important}
.ptab.prompts-tab.visible.on{border-bottom-color:var(--hi)}
.pbody{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* Theory */
.tscroll{flex:1;overflow-y:auto;padding:16px}
.ti{background:var(--card);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:13px 15px;margin-bottom:14px;font-size:.88rem;line-height:1.7;color:var(--text2)}
.ti strong{color:var(--text)}
.tc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 15px;margin-bottom:11px}
.tch{font-size:.88rem;font-weight:700;color:var(--accent2);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.tcb{font-size:.82rem;line-height:1.75;color:var(--text2)}
.tcb strong{color:var(--text)}
.ic{background:var(--codebg);color:#b5a4ff;padding:2px 6px;border-radius:5px;font-family:monospace;font-size:.8em}
.tpre{background:var(--codebg);border:1px solid var(--border);border-radius:9px;padding:13px;margin:9px 0;font-family:monospace;font-size:.76rem;line-height:1.7;color:#f0e8ff;overflow-x:auto;white-space:pre}
.tip{background:rgba(181,237,24,.07);border:1px solid rgba(181,237,24,.25);border-radius:9px;padding:11px 14px;font-size:.82rem;color:var(--text2);line-height:1.6;margin-top:9px}
.tip strong{color:var(--hi)}
.warn-box{background:rgba(255,165,2,.07);border:1px solid rgba(255,165,2,.25);border-radius:9px;padding:11px 14px;font-size:.82rem;color:var(--text2);line-height:1.6;margin-top:9px}
.warn-box strong{color:var(--warn)}

/* ─── MATCH QUIZ ─── */
.match-wrap{border-top:2px dashed var(--border);margin-top:20px;padding-top:18px}
.match-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.match-title{font-size:.92rem;font-weight:800;color:var(--text)}
.match-score-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:.78rem;font-weight:700;color:var(--text3);transition:all .3s}
.match-score-badge.done{background:rgba(181,237,24,.15);border-color:var(--hi);color:var(--hi)}
.match-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.match-col{display:flex;flex-direction:column;gap:7px}
.match-col-hdr{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);padding:0 4px;margin-bottom:2px}
.mi{border:2px solid var(--border);border-radius:10px;padding:9px 10px;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;background:var(--card);display:flex;align-items:center;justify-content:center;min-height:54px;position:relative}
.mi:hover:not(.locked){border-color:var(--accent2);background:var(--glow)}
.mi.sel{border-color:var(--accent)!important;background:var(--glow)!important;box-shadow:0 0 0 2px var(--accent)}
.mi.ok{border-color:var(--hi)!important;background:rgba(181,237,24,.08)!important;cursor:default;pointer-events:none}
.mi.ok::after{content:'✓';position:absolute;top:4px;right:7px;font-size:.7rem;color:var(--hi);font-weight:800}
.mi.bad{border-color:var(--err)!important;background:rgba(255,71,87,.08)!important;animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.mi.locked{pointer-events:none}
.mi-preview{background:#fff;border-radius:6px;padding:7px 10px;width:100%;font-size:13px}
.mi-tag{font-family:'JetBrains Mono','Fira Code',monospace;font-size:.8rem;color:var(--accent2);text-align:center;line-height:1.4;padding:2px}
.match-done-msg{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:13px 16px;background:rgba(181,237,24,.08);border:1px solid rgba(181,237,24,.3);border-radius:12px;margin-top:14px;font-size:.86rem;color:var(--hi);font-weight:700;display:none}
.match-done-msg.show{display:flex;animation:fu .3s ease}
.next-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--hi);color:var(--hi-fg);border:none;border-radius:9px;font-size:.82rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:transform .15s,box-shadow .15s;flex-shrink:0}
.next-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(181,237,24,.45)}
.goto-prompts-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--hi);color:var(--hi-fg);border:none;border-radius:9px;font-size:.82rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:transform .15s,box-shadow .15s;margin-top:8px}
.goto-prompts-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(181,237,24,.45)}

/* Code editor */
.code-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ctabs{display:flex;align-items:center;background:var(--codebg);border-bottom:1px solid var(--border);flex-shrink:0;padding-right:8px}
.ctab{padding:8px 14px;font-size:.77rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:var(--text3);transition:all .17s}
.ctab.on{color:#f0e8ff;border-bottom-color:var(--accent2)}
.ctab:hover:not(.on){color:var(--text2)}
.ctab-space{flex:1}
.undo-btn{padding:5px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:.75rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.undo-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent2)}
.undo-btn:disabled{opacity:.3;cursor:not-allowed}
.ed-wrap{position:relative;flex:1;overflow:hidden;background:var(--codebg);display:flex}
.ed-hl{position:absolute;top:0;left:0;right:0;bottom:0;margin:0;padding:16px 18px;font-family:'JetBrains Mono','Fira Code',monospace;font-size:.9rem;line-height:1.85;white-space:pre;overflow:hidden;pointer-events:none;z-index:0;background:transparent;tab-size:2;letter-spacing:.01em;color:#D4D4D4}
.editor{position:absolute;top:0;left:0;right:0;bottom:0;background:transparent!important;color:transparent!important;caret-color:#aeafad;z-index:1;white-space:pre;overflow:auto;resize:none;outline:none;border:none;font-family:'JetBrains Mono','Fira Code',monospace;font-size:.9rem;line-height:1.85;padding:16px 18px;tab-size:2;letter-spacing:.01em}
.editor::selection{background:rgba(104,91,199,.35)}
.err-panel{background:#080008;border-top:1px solid rgba(255,71,87,.3);flex-shrink:0;max-height:100px;overflow-y:auto;display:none}
.err-panel.show{display:block}
.err-row{padding:5px 12px;color:var(--err);display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid rgba(255,71,87,.08);font-family:monospace;font-size:.73rem}
.err-line{color:rgba(255,71,87,.5);flex-shrink:0;min-width:30px}
.err-bar{background:var(--bg2);border-top:1px solid var(--border);padding:5px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.err-badge{font-size:.72rem;padding:3px 9px;border-radius:10px;font-weight:700;cursor:pointer;transition:all .15s}
.err-ok{background:rgba(181,237,24,.1);color:var(--ok);border:1px solid rgba(181,237,24,.25)}
.err-has{background:rgba(255,71,87,.12);color:var(--err);border:1px solid rgba(255,71,87,.25)}
.complete-btn{margin-left:auto;padding:5px 14px;background:var(--hi);color:var(--hi-fg);border:none;border-radius:8px;font-size:.76rem;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s}
.complete-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(181,237,24,.35)}

/* Reference */
.ref-scroll{flex:1;overflow-y:auto;padding:14px}
.ref-h{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin:0 0 10px}
.ref-sec{margin-bottom:20px}
.cg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:4px}
.cc{border-radius:8px;height:36px;cursor:pointer;border:2px solid transparent;transition:transform .12s,border-color .12s;position:relative;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px}
.cc:hover{transform:scale(1.12);border-color:rgba(255,255,255,.5)}
.cc.brand{border-color:var(--accent)!important}
.cc .chx{font-size:.56rem;font-family:monospace;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.9);opacity:0;transition:opacity .12s;pointer-events:none}
.cc:hover .chx{opacity:1}
.fg{display:flex;flex-direction:column;gap:5px}
.fr{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;transition:border-color .15s}
.fr:hover{border-color:var(--accent)}
.fl{font-size:.7rem;font-weight:700;color:var(--text3);width:34px}
.fp{font-family:monospace;font-size:.76rem;color:var(--accent2);width:42px}
.fv{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toast{position:fixed;bottom:20px;right:20px;background:var(--hi);color:var(--hi-fg);padding:8px 16px;border-radius:10px;font-size:.82rem;font-weight:700;z-index:9999;animation:fu .2s ease;pointer-events:none}

/* Prompts tab */
.prompts-scroll{flex:1;overflow-y:auto;padding:16px}
.prompts-win{background:rgba(181,237,24,.08);border:1px solid rgba(181,237,24,.3);border-radius:12px;padding:14px 16px;margin-bottom:18px;font-size:.88rem;line-height:1.6;color:var(--text2)}
.prompts-win strong{color:var(--hi)}
.pcat{margin-bottom:18px}
.pcat-h{font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--accent2);margin-bottom:9px}
.pbox{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px;position:relative}
.ptext{font-family:monospace;font-size:.74rem;line-height:1.65;color:var(--text2);white-space:pre-wrap;word-break:break-word;max-height:170px;overflow-y:auto}
.pcopy{position:absolute;top:9px;right:9px;padding:4px 10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.7rem;font-weight:700;cursor:pointer;transition:all .15s}
.pcopy:hover{background:var(--accent2);transform:scale(1.04)}
.pcopy.copied{background:var(--hi);color:var(--hi-fg)}

/* Preview */
.pbar{padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dots{display:flex;gap:5px}
.dot{width:11px;height:11px;border-radius:50%}
.dr{background:#ff5f57}.dy{background:#ffbd2e}.dg{background:#28c840}
.plabel{font-size:.73rem;color:var(--text3);flex:1;text-align:center}
.pw-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text3);white-space:nowrap;transition:all .2s}
.pw-badge.mob{background:rgba(181,237,24,.1);border-color:rgba(181,237,24,.3);color:var(--hi)}
.preview-iframe{flex:1;border:none;background:#fff}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
/* Context jump bar */
.ctx-bar{background:var(--bg3);border-top:1px solid var(--border);padding:4px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;min-height:26px;flex-wrap:wrap}
.ctx-chip{background:var(--glow);border:1px solid var(--accent);border-radius:6px;padding:1px 8px;font-size:.68rem;font-family:monospace;color:var(--accent2);cursor:pointer;transition:all .15s;white-space:nowrap}
.ctx-chip:hover{background:var(--accent);color:#fff}
/* Code task quiz */
.ctask-wrap{border-top:2px dashed var(--border);margin-top:20px;padding-top:18px}
.ctask-title{font-size:.88rem;font-weight:800;color:var(--text);margin-bottom:10px}
.ctask-code{background:var(--codebg);border:1px solid var(--border);border-radius:10px;padding:13px 15px;font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.8;color:#e0d8ff;margin-bottom:12px;overflow-x:auto;white-space:pre}
.ctask-row{display:flex;gap:8px;margin-bottom:8px}
.ctask-inp{flex:1;padding:8px 12px;background:var(--card);border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.85rem;outline:none;transition:border-color .2s}
.ctask-inp:focus{border-color:var(--accent)}
.ctask-inp.ok{border-color:var(--hi)!important;background:rgba(181,237,24,.07)}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let studentName   = localStorage.getItem('at2_name')||'';
let theme         = localStorage.getItem('at2_theme')||'dark';
let activeLsn     = -1;
let activeTab     = 'theory';
let activeCode    = 'html';
let undoStack     = [];
let undoPtr       = -1;
let errors        = [];
let matchSel      = null;   // selected left id
let matchDone     = {};     // {previewId: true}
let matchShuffled = [];     // shuffled tag pairs
let quizComplete  = false;
let completedLessons = new Set(JSON.parse(localStorage.getItem('at2_done')||'[]'));

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init(){
  applyTheme(theme);
  document.getElementById('nameInp').addEventListener('keydown',e=>{if(e.key==='Enter')startApp()});
  if(studentName) showApp();
}
function startApp(){
  const v=document.getElementById('nameInp').value.trim();
  if(!v){document.getElementById('nameInp').style.borderColor='var(--err)';setTimeout(()=>document.getElementById('nameInp').style.borderColor='',1200);return;}
  studentName=v;localStorage.setItem('at2_name',v);showApp();
}
function showApp(){
  document.getElementById('welcome').style.display='none';
  document.getElementById('app').style.display='grid';
  document.getElementById('studentBtn').textContent='👤 '+studentName;
  buildSidebar();updateProgress();
}
function changeName(){
  document.getElementById('nameInp').value=studentName;
  document.getElementById('welcome').style.display='flex';
  document.getElementById('app').style.display='none';
}
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  document.getElementById('themeBtn').textContent=t==='dark'?'☀️':'🌙';
}
function toggleTheme(){theme=theme==='dark'?'light':'dark';localStorage.setItem('at2_theme',theme);applyTheme(theme);}
function updateProgress(){
  const d=completedLessons.size,t=LESSONS.length;
  document.getElementById('progTxt').textContent=d+' / '+t;
  document.getElementById('progBar').style.width=(d/t*100)+'%';
}
function markDone(idx){completedLessons.add(idx);localStorage.setItem('at2_done',JSON.stringify([...completedLessons]));updateProgress();buildSidebar();}
function buildSidebar(){
  document.getElementById('lessonList').innerHTML=LESSONS.map((l,i)=>`
    <div class="lb ${i===activeLsn?'active':''} ${completedLessons.has(i)?'done':''}" onclick="loadLesson(${i})">
      <div class="lnum">${completedLessons.has(i)?'✓':l.emoji}</div>
      <div class="linfo"><div class="ltit">${l.title}</div><div class="ltag">${l.tag}</div></div>
    </div>`).join('');
}

// ══════════════════════════════════════════════
// LOAD LESSON
// ══════════════════════════════════════════════
function loadLesson(idx){
  activeLsn=idx; activeTab='theory'; activeCode='html';
  undoStack=[]; undoPtr=-1; errors=[];
  // Reset match state
  matchSel=null; matchDone={}; quizComplete=false;
  const l=LESSONS[idx];
  matchShuffled=[...(l.matchPairs||[])].sort(()=>Math.random()-.5);
  document.querySelectorAll('.lb').forEach((el,i)=>el.classList.toggle('active',i===idx));
  const isPrompt=l.tag==='ИИ / Промпты';
  document.getElementById('main').innerHTML=`
    <div class="lview">
      <div class="ltop">
        <div class="lmeta">
          <span class="lpill">${l.tag}</span>
          <span class="lnl">Урок ${idx+1} из ${LESSONS.length}</span>
        </div>
        <div class="lh">${l.emoji} ${l.title}</div>
        <div class="ls">${l.subtitle}</div>
      </div>
      <div class="split" id="split">
        <div class="lpanel" id="lpanel" style="width:50%">
          <div class="ptabs" id="ptabs">
            <div class="ptab on"  id="pt-theory"  onclick="switchTab('theory')">📖 Теория</div>
            <div class="ptab"     id="pt-code"    onclick="switchTab('code')">⌨️ ${isPrompt?'Редактор':'Код'}</div>
            <div class="ptab"     id="pt-ref"     onclick="switchTab('ref')">🎨 Справка</div>
            <div class="ptab prompts-tab" id="pt-prompts" onclick="switchTab('prompts')">📋 Промпты</div>
          </div>
          <div class="pbody" id="pbody"></div>
        </div>
        <div class="dvd" id="dvd"></div>
        <div class="rpanel">
          <div class="pbar">
            <div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div>
            <div class="plabel">${isPrompt?'📝 Промпт-редактор':'🌐 Предпросмотр'}</div>
            <div class="pw-badge" id="pwBadge">🖥️ Desktop</div>
          </div>
          <iframe class="preview-iframe" id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
      </div>
    </div>`;
  initDrag();
  switchTab('theory');
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
function switchTab(tab){
  activeTab=tab;
  ['theory','code','ref','prompts'].forEach(t=>{
    document.getElementById('pt-'+t)?.classList.toggle('on',t===tab);
  });
  const l=LESSONS[activeLsn];
  if(tab==='theory') renderTheory(l);
  else if(tab==='code') renderCode(l);
  else if(tab==='ref') renderRef();
  else if(tab==='prompts') renderPrompts(l);
}

// ══════════════════════════════════════════════
// THEORY + MATCH QUIZ (same scroll)
// ══════════════════════════════════════════════
function renderTheory(l){
  document.getElementById('pbody').innerHTML=`<div class="tscroll" id="tscroll">
    ${l.theory(studentName)}
    ${buildMatchHTML(l)}
  </div>`;
  renderPreview(l);
}

function buildMatchHTML(l){
  const pairs=l.matchPairs||[];
  if(!pairs.length) return '';
  const done=Object.keys(matchDone).length;
  const isDone=quizComplete;
  return `
  <div class="match-wrap">
    <div class="match-hdr">
      <div class="match-title">🧩 Тест: сопоставь тег с предпросмотром</div>
      <div class="match-score-badge ${isDone?'done':''}" id="matchBadge">${isDone?'🏆 Всё верно!':done+' / '+pairs.length}</div>
    </div>
    <div class="match-cols">
      <div class="match-col">
        <div class="match-col-hdr">👁️ Предпросмотр</div>
        ${pairs.map(p=>`
          <div class="mi ${matchDone[p.id]?'ok locked':''}" id="ml-${p.id}" onclick="selectLeft('${p.id}')">
            <div class="mi-preview">${p.preview}</div>
          </div>`).join('')}
      </div>
      <div class="match-col">
        <div class="match-col-hdr">🏷️ Теги</div>
        ${matchShuffled.map(p=>`
          <div class="mi ${matchDone[p.id]?'ok locked':''}" id="mr-${p.id}" onclick="selectRight('${p.id}')">
            <div class="mi-tag">${p.tag}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="match-done-msg ${isDone?'show':''}" id="matchDoneMsg">
      ${isDone?`<span>🎉 Отлично, ${escHtml(studentName)}! Тест пройден!</span><button class="next-btn" onclick="showCodeTask()">Далее — Допиши код →</button>`:''}
    </div>
  </div>`;
}

function selectLeft(id){
  const l=LESSONS[activeLsn];
  if(matchDone[id]) return;
  // Deselect old
  if(matchSel) document.getElementById('ml-'+matchSel)?.classList.remove('sel');
  matchSel = matchSel===id ? null : id;
  if(matchSel) document.getElementById('ml-'+matchSel)?.classList.add('sel');
}

function selectRight(tagId){
  if(!matchSel) return;
  const leftId=matchSel;
  if(matchDone[tagId]) return;
  const correct = leftId === tagId;
  if(correct){
    matchDone[leftId]=true;
    document.getElementById('ml-'+leftId)?.classList.replace('sel','ok');
    document.getElementById('ml-'+leftId)?.classList.add('locked');
    document.getElementById('mr-'+tagId)?.classList.add('ok','locked');
    matchSel=null;
    checkMatchComplete();
  } else {
    // Flash wrong on both
    const lEl=document.getElementById('ml-'+leftId);
    const rEl=document.getElementById('mr-'+tagId);
    lEl?.classList.add('bad'); rEl?.classList.add('bad');
    setTimeout(()=>{
      lEl?.classList.remove('bad'); rEl?.classList.remove('bad');
      lEl?.classList.remove('sel'); matchSel=null;
    }, 450);
  }
}

function checkMatchComplete(){
  const l=LESSONS[activeLsn];
  const done=Object.keys(matchDone).length;
  const total=l.matchPairs.length;
  const badge=document.getElementById('matchBadge');
  if(badge) badge.textContent=done+' / '+total;
  if(done===total){
    quizComplete=true;
    if(badge){badge.className='match-score-badge done';badge.textContent='🏆 Всё верно!';}
    const msg=document.getElementById('matchDoneMsg');
    if(msg){
      msg.innerHTML=`<span>🎉 Отлично, ${escHtml(studentName)}! Тест пройден!</span><button class="next-btn" onclick="showCodeTask()">Далее — Допиши код →</button>`;
      msg.classList.add('show');
    }
    markDone(activeLsn);
    // Inject code task hidden — shown only after clicking Далее
    const mw=document.querySelector('.match-wrap');
    const ct=l.codeTask;
    if(mw&&ct){
      const tmp=document.createElement('div');
      tmp.innerHTML=buildCodeTask(l);
      if(tmp.firstElementChild) mw.parentNode.insertBefore(tmp.firstElementChild,mw.nextSibling);
    }
    // Prompts tab revealed only after code task is answered correctly (in checkCodeTask)
  }
}

// ══════════════════════════════════════════════
// PROMPTS TAB
// ══════════════════════════════════════════════
function renderPrompts(l){
  const keys=l.promptKeys||Object.keys(PROMPTS);
  document.getElementById('pbody').innerHTML=`<div class="prompts-scroll">
    <div class="prompts-win">
      🏆 <strong>Тест пройден, ${escHtml(studentName)}!</strong><br>
      Вот готовые промпты для ChatGPT и Claude по теме этого урока. Копируй и используй!
    </div>
    ${keys.map(k=>PROMPTS[k]?`
    <div class="pcat">
      <div class="pcat-h">${PROMPTS[k].label}</div>
      <div class="pbox">
        <button class="pcopy" id="pcopy-${k}" onclick="copyPrompt('${k}')">Копировать</button>
        <div class="ptext">${escHtml(PROMPTS[k].text)}</div>
      </div>
    </div>`:''). join('')}
  </div>`;
}

function copyPrompt(key){
  const text=PROMPTS[key]?.text||'';
  navigator.clipboard?.writeText(text).then(()=>{
    const btn=document.getElementById('pcopy-'+key);
    if(btn){btn.textContent='✓ Скопировано';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Копировать';btn.classList.remove('copied')},2000);}
  });
}

// ══════════════════════════════════════════════
// CODE EDITOR
// ══════════════════════════════════════════════
function renderCode(l){
  const isP=l.tag==='ИИ / Промпты';
  document.getElementById('pbody').innerHTML=`
    <div class="code-area">
      <div class="ctabs">
        <div class="ctab on" id="ct-html" onclick="switchCode('html')">${isP?'📝 Промпт':'HTML'}</div>
        <div class="ctab" id="ct-css"  onclick="switchCode('css')">${isP?'💡 Примеры':'CSS'}</div>
        <div class="ctab-space"></div>
        <button class="undo-btn" id="undoBtn" onclick="doUndo()" disabled>↩ Отменить</button>
      </div>
      <div style="flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column">
        <div class="ed-wrap" id="htmlWrap">
          <pre class="ed-hl" id="htmlHL" aria-hidden="true"></pre>
          <textarea class="editor" id="htmlEd" spellcheck="false"></textarea>
        </div>
        <div class="ed-wrap" id="cssWrap" style="display:none">
          <pre class="ed-hl" id="cssHL" aria-hidden="true"></pre>
          <textarea class="editor" id="cssEd" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="ctx-bar" id="ctxBar"></div>
      <div class="err-panel" id="errPanel"></div>
      <div class="err-bar">
        <div class="err-badge err-ok" id="errBadge" onclick="toggleErr()">✓ Ошибок нет</div>
        <button class="complete-btn" onclick="completeLesson()">✅ Завершить урок</button>
      </div>
    </div>`;
  const he=document.getElementById('htmlEd'), ce=document.getElementById('cssEd');
  he.value=formatHTML(l.html(studentName)); ce.value=formatCSS(l.css(studentName));
  syncHL('htmlEd','htmlHL','html');syncHL('cssEd','cssHL','css');
  pushUndo();
  he.addEventListener('input',()=>{pushUndo();renderPreviewCode();syncHL('htmlEd','htmlHL','html');detectEditorCtx();});
  ce.addEventListener('input',()=>{pushUndo();renderPreviewCode();syncHL('cssEd','cssHL','css');});
  he.addEventListener('scroll',()=>{const hl=document.getElementById('htmlHL');if(hl){hl.scrollTop=he.scrollTop;hl.scrollLeft=he.scrollLeft;}});
  ce.addEventListener('scroll',()=>{const hl=document.getElementById('cssHL');if(hl){hl.scrollTop=ce.scrollTop;hl.scrollLeft=ce.scrollLeft;}});
  he.addEventListener('keyup',detectEditorCtx);
  he.addEventListener('click',detectEditorCtx);
  [he,ce].forEach(ed=>{
    ed.addEventListener('keydown',e=>{
      if(e.key==='Tab'){e.preventDefault();const s=ed.selectionStart;ed.value=ed.value.substring(0,s)+'  '+ed.value.substring(ed.selectionEnd);ed.selectionStart=ed.selectionEnd=s+2;if(ed===he){pushUndo();renderPreviewCode();syncHL('htmlEd','htmlHL','html');detectEditorCtx();}else{pushUndo();renderPreviewCode();syncHL('cssEd','cssHL','css');}}
      if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();}
    });
  });
  switchCode('html');
  renderPreviewCode();
}

function pushUndo(){

  undoStack.splice(undoPtr+1);

  if(undoStack.length>60) undoStack.shift();

}
function doUndo(){
  if(undoPtr>0){
    undoPtr--;

    if(he) he.value=s.h;
    if(ce) ce.value=s.c;
    const btn=document.getElementById('undoBtn');
    if(btn) btn.disabled=undoPtr<=0;
    syncHL('htmlEd','htmlHL','html');syncHL('cssEd','cssHL','css');
    renderPreviewCode();
  }
}

function buildPreview(html,css){
  const iframe=document.getElementById('preview');
  if(!iframe) return;
  lintCode(html,css);
  const hlScript=`<script>window.addEventListener('message',function(e){if(e.data&&e.data.t==='hl'){document.querySelectorAll('[data-hl]').forEach(function(el){el.removeAttribute('data-hl');});if(e.data.sel){try{document.querySelectorAll(e.data.sel).forEach(function(el){el.setAttribute('data-hl','1');});}catch(x){}}}});<\/script><style>[data-hl]{outline:2px solid #685BC7!important;outline-offset:2px;border-radius:2px;}<\/style>`;
  const errScript=`<script>window.onerror=function(m,s,l){parent.postMessage({t:'jsErr',msg:m,line:l},'*');return false};<\/script>`;
  let doc=html;
  if(doc.includes('</head>')) doc=doc.replace('</head>',`<style>${css}</style>${hlScript}${errScript}</head>`);
  else doc=`<style>${css}</style>${hlScript}${errScript}${doc}`;
  iframe.srcdoc=doc;
}

function lintCode(html,css){
  // Clear previous
  errors=[];
  const b=document.getElementById('errBadge');
  const p=document.getElementById('errPanel');
  if(b){b.className='err-badge err-ok';b.textContent='✓ Ошибок нет';}
  if(p){p.classList.remove('show');p.innerHTML='';}

  const SELF_CLOSE=new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr','!doctype']);
  const REQUIRED=new Set(['html','head','body','div','section','article','header','footer','nav','main','aside','form','ul','ol','li','table','tr','td','th','h1','h2','h3','h4','h5','h6','p','a','span','strong','em','button','label','script','style','select','option','textarea']);
  const stack=[];
  const tagRe=/<(\/?)([a-zA-Z][a-zA-Z0-9]*)\b[^>]*?(\/?)>/g;
  let m;
  while((m=tagRe.exec(html))!==null){
    const isClose=m[1]==='/';
    const tag=m[2].toLowerCase();
    const isSelf=m[3]==='/'||SELF_CLOSE.has(tag);
    const line=html.substring(0,m.index).split('\n').length;
    if(!isClose&&!isSelf){
      stack.push({tag,line});
    } else if(isClose&&!SELF_CLOSE.has(tag)){
      let found=-1;
      for(let i=stack.length-1;i>=0;i--){if(stack[i].tag===tag){found=i;break;}}
      if(found===-1){
        addError('Лишний закрывающий тег </'+tag+'>',line);
      } else {
        if(found<stack.length-1){
          const unclosed=stack[found+1];
          addError('Тег <'+unclosed.tag+'> не закрыт (строка '+unclosed.line+')',line);
        }
        stack.splice(found);
      }
    }
  }
  stack.filter(t=>REQUIRED.has(t.tag)).forEach(t=>{
    addError('Тег <'+t.tag+'> не закрыт',t.line);
  });

  // CSS brace check
  const opens=(css.match(/\{/g)||[]).length;
  const closes=(css.match(/\}/g)||[]).length;
  if(opens!==closes){
    addError('CSS: скобок { открыто '+opens+', закрыто '+closes,'?');
  }
  // CSS empty value check
  const emptyProp=css.match(/[\w-]+\s*:\s*;/);
  if(emptyProp) addError('CSS: пустое значение свойства — '+emptyProp[0].trim(),'?');
}

function detectEditorCtx(){
  if(activeCode!=='html') return;
  const ed=document.getElementById('htmlEd'),bar=document.getElementById('ctxBar');
  if(!ed||!bar) return;
  const pos=ed.selectionStart,text=ed.value;
  let ts=-1;
  for(let i=pos;i>=0;i--){if(text[i]==='<'&&text[i+1]!='/'){ts=i;break;}if(text[i]==='>') break;}
  if(ts===-1){bar.innerHTML='';return;}
  const te=text.indexOf('>',ts);
  const chunk=te===-1?text.slice(ts):text.slice(ts,te+1);
  const tagM=chunk.match(/^<([a-zA-Z][a-zA-Z0-9]*)/);
  const classM=chunk.match(/class="([^"]+)"/);
  const idM=chunk.match(/id="([^"]+)"/);
  const css=document.getElementById('cssEd')?.value||'';
  const jumps=[];
  if(tagM){const t=tagM[1];const idx=css.search(new RegExp(t+'[\\s{,:]'));if(idx!==-1)jumps.push({label:`<${t}>`,idx});}
  if(classM){classM[1].trim().split(/\s+/).forEach(cls=>{const idx=css.indexOf('.'+cls);if(idx!==-1)jumps.push({label:'.'+cls,idx});});}
  if(idM){const idx=css.indexOf('#'+idM[1]);if(idx!==-1)jumps.push({label:'#'+idM[1],idx});}
  bar.innerHTML=jumps.length?'<span style="font-size:.65rem;color:var(--text3);margin-right:4px">→ CSS:</span>'+jumps.map(j=>`<span class="ctx-chip" onclick="jumpToCSS(${j.idx})">${escHtml(j.label)}</span>`).join(''):'';
  // Highlight in preview
  const iframe=document.getElementById('preview');
  if(iframe&&jumps.length){
    const best=jumps.find(j=>j.label.startsWith('#'))||jumps.find(j=>j.label.startsWith('.'))||jumps[0];
    try{iframe.contentWindow?.postMessage({t:'hl',sel:best?.label.replace(/^<|>$/g,'')},'*');}catch(e){}
  }
}

function jumpToCSS(idx){
  switchCode('css');
  requestAnimationFrame(()=>{
    const ed=document.getElementById('cssEd');if(!ed) return;
    ed.focus();ed.setSelectionRange(idx,idx);
    const lh=parseFloat(getComputedStyle(ed).lineHeight)||28;
    const lineN=ed.value.substring(0,idx).split('\n').length-1;
    ed.scrollTop=Math.max(0,lineN*lh-60);
    syncHL('cssEd','cssHL','css');
  });
}

// DRAG RESIZE — smooth via RAF + pointer-events
// ══════════════════════════════════════════════
function initDrag(){
  const dvd=document.getElementById('dvd');
  const split=document.getElementById('split');
  const lpanel=document.getElementById('lpanel');
  if(!dvd||!split||!lpanel) return;
  let dragging=false, rafId=null, pendingX=0;

  dvd.addEventListener('mousedown',e=>{
    dragging=true;
    dvd.classList.add('dragging');
    document.body.classList.add('dragging'); // disables iframe pointer-events
    e.preventDefault();
  });

  document.addEventListener('mousemove',e=>{
    if(!dragging) return;
    pendingX=e.clientX;
    if(rafId) return; // already scheduled
    rafId=requestAnimationFrame(()=>{
      rafId=null;
      const r=split.getBoundingClientRect();
      let pct=((pendingX-r.left)/r.width)*100;
      pct=Math.max(22,Math.min(76,pct));
      lpanel.style.width=pct+'%';
      // Update preview width badge
      const previewW=r.width*(1-pct/100)-5;
      const badge=document.getElementById('pwBadge');
      if(badge){
        if(previewW<430){badge.className='pw-badge mob';badge.textContent='📱 '+Math.round(previewW)+'px';}
        else if(previewW<780){badge.className='pw-badge';badge.textContent='📱 '+Math.round(previewW)+'px';}
        else{badge.className='pw-badge';badge.textContent='🖥️ '+Math.round(previewW)+'px';}
      }
    });
  });

  document.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false;
    dvd.classList.remove('dragging');
    document.body.classList.remove('dragging');
    if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  });
}

// ══════════════════════════════════════════════
// SYNTAX HIGHLIGHTING
// ══════════════════════════════════════════════
function hlHTML(src){
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  let out='',i=0;
  while(i<src.length){
    if(src.startsWith('<!--',i)){
      const e=src.indexOf('-->',i+4);const chunk=e===-1?src.slice(i):src.slice(i,e+3);
      out+=`<span style="color:#6A9955">${esc(chunk)}</span>`;i+=chunk.length;
    } else if(src.startsWith('</',i)){
      const e=src.indexOf('>',i);if(e===-1){out+=esc(src.slice(i));break;}
      const seg=src.slice(i,e+1);const m=seg.match(/^<\/([a-zA-Z][a-zA-Z0-9]*)/);
      if(m)out+=`<span style="color:#808080">&lt;/</span><span style="color:#4EC9B0">${esc(m[1])}</span><span style="color:#808080">&gt;</span>`;
      else out+=esc(seg);i=e+1;
    } else if(src[i]==='<'){
      const e=src.indexOf('>',i);if(e===-1){out+=esc(src.slice(i));break;}
      const seg=src.slice(i,e+1);
      const m=seg.match(/^<(!DOCTYPE|[a-zA-Z][a-zA-Z0-9]*)([\s\S]*?)(\/?>)$/i);
      if(!m){out+=esc(seg);i=e+1;continue;}
      const[,name,attrs,close]=m;
      const isDoc=name.toUpperCase()==='!DOCTYPE';
      const aHL=attrs.replace(/([a-zA-Z:_-][a-zA-Z0-9:_.-]*)(\s*=\s*)("([^"]*)")/g,
        (_,an,eq,av)=>`<span style="color:#9CDCFE">${esc(an)}</span><span style="color:#D4D4D4">${esc(eq)}</span><span style="color:#CE9178">${esc(av)}</span>`);
      out+=`<span style="color:#808080">&lt;</span><span style="color:${isDoc?'#808080':'#4EC9B0'}">${esc(name)}</span>${aHL}<span style="color:#808080">${esc(close)}</span>`;
      i=e+1;
    } else {
      const nx=src.indexOf('<',i);const chunk=nx===-1?src.slice(i):src.slice(i,nx);
      out+=`<span style="color:#D4D4D4">${esc(chunk)}</span>`;i+=chunk.length;
    }
  }
  return out;
}

function hlCSS(src){
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  let out='',i=0;
  while(i<src.length){
    if(src.startsWith('/*',i)){
      const e=src.indexOf('*/',i+2);const chunk=src.slice(i,e===-1?src.length:e+2);
      out+=`<span style="color:#6A9955">${esc(chunk)}</span>`;i+=chunk.length;continue;
    }
    const bo=src.indexOf('{',i);if(bo===-1){out+=`<span style="color:#D7BA7D">${esc(src.slice(i))}</span>`;break;}
    out+=`<span style="color:#D7BA7D">${esc(src.slice(i,bo))}</span><span style="color:#D4D4D4">{</span>`;
    i=bo+1;
    const bc=src.indexOf('}',i);const props=bc===-1?src.slice(i):src.slice(i,bc);
    out+=props.replace(/([a-zA-Z-]+)(\s*:\s*)([^;}\n]+)(;?)/g,
      (_,p,c,v,s)=>`<span style="color:#9CDCFE">${esc(p)}</span><span style="color:#D4D4D4">${esc(c)}</span><span style="color:#CE9178">${esc(v)}</span><span style="color:#D4D4D4">${esc(s)}</span>`);
    if(bc!==-1){out+=`<span style="color:#D4D4D4">}</span>`;i=bc+1;}else break;
  }
  return out;
}

function syncHL(edId,hlId,mode){
  const ed=document.getElementById(edId),hl=document.getElementById(hlId);
  if(!ed||!hl) return;
  hl.innerHTML=mode==='css'?hlCSS(ed.value):hlHTML(ed.value);
  hl.scrollTop=ed.scrollTop;hl.scrollLeft=ed.scrollLeft;
}

// UTILS
// ══════════════════════════════════════════════
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function formatCSS(css){
  if(!css||!css.trim()) return css;
  // Collapse whitespace first
  let s=css.replace(/\r?\n/g,' ').replace(/\s+/g,' ').trim();
  // { → {\n  (open block + indent)
  s=s.replace(/\{\s*/g,'{\n  ');
  // ; → ;\n  (each property on new line)
  s=s.replace(/;\s*/g,';\n  ');
  // trim trailing spaces before }
  s=s.replace(/\s*\}/g,'\n}\n');
  // clean up blank lines inside blocks
  s=s.replace(/\{\n  \n/g,'{\n  ');
  // collapse multiple blank lines
  s=s.replace(/\n{3,}/g,'\n\n');
  // remove trailing spaces
  s=s.split('\n').map(l=>l.trimEnd()).join('\n');
  return s.trim();
}

function formatHTML(html){
  if(!html||!html.trim()) return html;
  // Already multi-line — just normalize indentation simply
  const lines=html.split('\n');
  let indent=0;
  const VOID=new Set(['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr','!doctype']);
  return lines.map(raw=>{
    const line=raw.trim();
    if(!line) return '';
    // closing tag → dedent before printing
    if(/^<\/[a-z]/i.test(line)) indent=Math.max(0,indent-1);
    const out='  '.repeat(indent)+line;
    // opening tag (not self-closing, not void) → indent next
    const tagM=line.match(/^<([a-z][a-z0-9]*)/i);
    if(tagM&&!VOID.has(tagM[1].toLowerCase())&&!line.endsWith('/>')&&!line.startsWith('</')) indent++;
    return out;
  }).filter((_,i,a)=>_.trim()||a[i-1]?.trim()).join('\n');
}

function showResetConfirm(){
  document.getElementById('resetConfirm').classList.add('show');
}
function hideResetConfirm(){
  document.getElementById('resetConfirm').classList.remove('show');
}
function doReset(){
  localStorage.removeItem('at2_name');
  localStorage.removeItem('at2_theme');
  localStorage.removeItem('at2_done');
  location.reload();
}

init();
</script>
